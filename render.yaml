services:
  - type: web
    name: regtecg-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: "pip install -e . && alembic upgrade head"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: REDIS_URL
        sync: false   # set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: 0.1.0
      - key: FRONTEND_URL
        sync: false   # set after Vercel deploy
